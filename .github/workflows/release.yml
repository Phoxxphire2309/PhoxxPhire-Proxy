name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual builds: produce downloadable installers without publishing a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & publish (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The Real-ESRGAN models aren't committed, so every build provisions the
      # upscaler. macOS keeps the repo's universal binary (Intel + Apple Silicon)
      # and just refreshes the models; other OSes fetch their native binary
      # (plus vulkan-1.dll on Windows) and models.
      - name: Provision upscaler (macOS — keep universal binary)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cp resources/vendor/realesrgan-ncnn-vulkan "$RUNNER_TEMP/upscaler-universal"
          node scripts/fetch-upscaler.mjs --force
          cp "$RUNNER_TEMP/upscaler-universal" resources/vendor/realesrgan-ncnn-vulkan
          chmod +x resources/vendor/realesrgan-ncnn-vulkan

      - name: Provision upscaler (Windows/Linux — fetch native)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          rm -f resources/vendor/realesrgan-ncnn-vulkan
          node scripts/fetch-upscaler.mjs --force

      - name: Build installer
        # On a version tag: build + publish a GitHub release. On a manual run:
        # build only; the installers are uploaded as workflow artifacts below.
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            npm run release
          else
            npm run package
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing cert for the current OS (base64 .p12/.pfx) + its password.
          # Empty when the secrets aren't set → an unsigned build is produced.
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK || secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MAC_CSC_KEY_PASSWORD || secrets.WIN_CSC_KEY_PASSWORD }}
          # Only scan for an identity when we actually provided one.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK != '' }}
          # macOS notarization — electron-builder runs it automatically when set.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload installers (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
          if-no-files-found: ignore
