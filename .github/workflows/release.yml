name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual builds: produce downloadable installers without publishing a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The upscaler binary + models live under resources/vendor (gitignored),
      # so every build fetches the native Real-ESRGAN binary and models for its
      # OS. The macOS asset is a universal binary (Intel + Apple Silicon); the
      # Windows asset also brings vulkan-1.dll, which fetch-upscaler copies.
      - name: Provision Real-ESRGAN upscaler (binary + models)
        run: node scripts/fetch-upscaler.mjs --force

      - name: Build installer
        # Build only — never publish from the matrix. Three OS jobs publishing in
        # parallel would each race to create the GitHub release for the tag,
        # producing duplicate drafts with the assets split between them. Instead
        # every job just builds and uploads its output; the single `release` job
        # below collects all three platforms and publishes one complete release.
        shell: bash
        run: |
          # Without a macOS signing cert, skip signing entirely — ad-hoc signing
          # on a runner errors ("<root> not a file"). Harmless on Windows/Linux.
          EXTRA=""
          if [ "${{ runner.os }}" = "macOS" ] && [ -z "${{ secrets.MAC_CSC_LINK }}" ]; then
            EXTRA="-c.mac.identity=null"
          fi
          npm run build
          npx electron-builder --publish never $EXTRA
        env:
          # Signing cert for the current OS (base64 .p12/.pfx) + its password.
          # Empty when the secrets aren't set → an unsigned build is produced.
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK || secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MAC_CSC_KEY_PASSWORD || secrets.WIN_CSC_KEY_PASSWORD }}
          # Only scan for an identity when we actually provided one.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK != '' }}
          # macOS notarization — electron-builder runs it automatically when set.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Upload the full build output — installers AND the electron-updater
      # metadata (latest*.yml + .blockmap), which the auto-updater needs and the
      # old workflow dropped. On manual runs these are the downloadable result;
      # on a tag push the `release` job below turns them into a GitHub release.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore

  release:
    name: Publish GitHub release
    needs: build
    # Only a version tag publishes a release; manual runs stop at the artifacts.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all
          pattern: dist-*
          merge-multiple: true

      - name: Publish release
        # One release, all platforms attached, marked Latest so the in-app update
        # check (which reads /releases/latest) sees it. Idempotent: if a release
        # for the tag already exists, replace its assets and ensure it's the
        # published Latest rather than failing.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" --repo "$REPO" --clobber dist-all/*
            gh release edit "$TAG" --repo "$REPO" --draft=false --latest
          else
            gh release create "$TAG" --repo "$REPO" --title "$TAG" \
              --generate-notes --latest dist-all/*
          fi
