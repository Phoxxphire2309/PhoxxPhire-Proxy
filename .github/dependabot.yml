version: 2
updates:
  # Application dependencies.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk updates so they don't each open a PR.
      dev-dependencies:
        dependency-type: development
        update-types: ['minor', 'patch']

  # The GitHub Actions used by the CI / release workflows.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
