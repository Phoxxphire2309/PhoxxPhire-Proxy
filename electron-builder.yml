appId: com.phoxxphire.proxy
productName: PhoxxPhire Proxy
# Auto-update source. electron-updater reads releases published here; updates
# only apply to code-signed builds, so this is inert until signing is set up.
publish:
  provider: github
  owner: Phoxxphire2309
  repo: PhoxxPhire-Proxy
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
extraResources:
  - from: resources/vendor
    to: vendor
    filter:
      - '**/*'
      - '!README.md'
asar: true
# sharp ships a native binary that must run from outside the asar archive.
asarUnpack:
  - '**/node_modules/sharp/**'
  - '**/node_modules/@img/**'
mac:
  target:
    - dmg
  category: public.app-category.graphics-design
  # Signing settings only take effect when a signing identity is provided
  # (CSC_LINK). Notarization runs automatically when APPLE_ID / APPLE_TEAM_ID /
  # APPLE_APP_SPECIFIC_PASSWORD are set. See docs/SIGNING.md.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  category: Graphics
